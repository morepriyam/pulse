# ─────────────────────────────────────────────────────────────────────────────
# iOS Expo Build & Upload
#
# Composes mieweb/actions building blocks (pinned to v2.2.4) instead of the
# turnkey reusable workflow, so we can sign WITHOUT fastlane match:
#   prepare-expo-env → stamp build number → expo prebuild → pod install
#   → sign-archive-upload-ios (secrets) → upload to TestFlight
#
# Signing mode: secrets
#   You supply BOTH the distribution certificate (.p12) and the matching App
#   Store provisioning profile (.mobileprovision) as secrets. The profile must
#   include the cert in the .p12 — generate them as a pair. No API fetch, no
#   readonly limitation.
#
# Required org/repo secrets:
#   APPLE_TEAM_ID                    Apple Developer Team ID  (= X5873NL7XM)
#   APPLE_API_KEY_ID                 App Store Connect API key ID (TestFlight upload)
#   APPLE_API_ISSUER_ID              App Store Connect issuer ID
#   APPLE_API_KEY_P8_BASE64          base64 of the .p8 API key
#   IOS_DIST_CERT_P12_BASE64         base64 of the distribution cert (.p12)
#   IOS_DIST_CERT_PASSWORD           password set when exporting the .p12
#   IOS_PROVISIONING_PROFILE_BASE64  base64 of the App Store .mobileprovision
# ─────────────────────────────────────────────────────────────────────────────
name: iOS Expo Build & Upload

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the build to TestFlight"
        type: boolean
        default: true

jobs:
  ios:
    runs-on: macos-latest
    steps:
      # ── Checkout, Xcode, Node, JS deps ────────────────────────────────────
      - name: Setup Expo environment
        uses: mieweb/actions/prepare-expo-env@cf09c85fd27cbe235184539df1b421a5c50b0ec7 # v2.2.4
        with:
          package_manager: npm
          node_version: "20"

      # ── Give every CI build a unique, increasing build number ─────────────
      - name: Stamp build number
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));j.expo.ios=j.expo.ios||{};j.expo.ios.buildNumber=String(process.env.GITHUB_RUN_NUMBER);fs.writeFileSync('app.json',JSON.stringify(j,null,2));console.log('iOS buildNumber =',j.expo.ios.buildNumber);"

      # ── Regenerate native ios/ from app.json ──────────────────────────────
      - name: Expo prebuild (ios)
        run: npx expo prebuild --clean --platform ios --non-interactive

      # ── Force the distribution signing identity ───────────────────────────
      # expo prebuild writes CODE_SIGN_IDENTITY = "Apple Development" into the
      # generated project. The signing action forces manual signing with a
      # distribution profile but does NOT override the identity, so a Release
      # archive looks for a development cert (which we don't have) and fails
      # with: No signing certificate "iOS Development" found.
      # Rewrite the identity to match the distribution cert in our .p12.
      - name: Force distribution signing identity
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PW:     ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -e
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          SUBJ=$(openssl pkcs12 -in "$RUNNER_TEMP/dist.p12" -clcerts -nokeys \
                   -passin pass:"$P12_PW" 2>/dev/null \
                 | openssl x509 -noout -subject 2>/dev/null || true)
          rm -f "$RUNNER_TEMP/dist.p12"
          echo "Distribution cert subject: ${SUBJ:-<unreadable>}"
          # Pick the generic identity that matches the cert type. A cert created
          # as "iOS Distribution (App Store & Ad Hoc)" has CN "iPhone Distribution: …";
          # the newer "Apple Distribution" option has CN "Apple Distribution: …".
          if echo "$SUBJ" | grep -q "Apple Distribution"; then
            IDENTITY="Apple Distribution"
          else
            IDENTITY="iPhone Distribution"
          fi
          echo "Setting CODE_SIGN_IDENTITY = $IDENTITY"
          PBX=$(ls ios/*.xcodeproj/project.pbxproj | head -1)
          sed -i.bak "s/CODE_SIGN_IDENTITY = \"[^\"]*\"/CODE_SIGN_IDENTITY = \"$IDENTITY\"/g" "$PBX"
          sed -i.bak2 "s/\"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]\" = \"[^\"]*\"/\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"$IDENTITY\"/g" "$PBX"
          rm -f "$PBX.bak" "$PBX.bak2"
          echo "Resulting CODE_SIGN_IDENTITY entries:"
          grep -n "CODE_SIGN_IDENTITY" "$PBX" || echo "::warning::no CODE_SIGN_IDENTITY entries found to patch"

      # ── pod install + sign + archive + upload ─────────────────────────────
      - name: Build & upload iOS to TestFlight
        uses: mieweb/actions/sign-archive-upload-ios@cf09c85fd27cbe235184539df1b421a5c50b0ec7 # v2.2.4
        with:
          signing_mode:            secrets
          app_identifier:          com.mieweb.pulse.dev
          apple_team_id:           ${{ secrets.APPLE_TEAM_ID }}
          apple_api_key_id:        ${{ secrets.APPLE_API_KEY_ID }}
          apple_api_issuer_id:     ${{ secrets.APPLE_API_ISSUER_ID }}
          apple_api_key_p8_base64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          ios_cert_p12_base64:     ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          ios_cert_password:       ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          ios_prov_profile_base64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          ios_build_dir:           ios
          run_pod_install:         "true"
          upload_to_testflight:    ${{ inputs.upload_to_testflight }}
